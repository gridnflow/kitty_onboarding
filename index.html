<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MEOW CORP HQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="hud">
  <div class="chip">WASD Move / E Interact / Drag to Look / Scroll to Zoom</div>
  <div id="prompt"></div>
  <div id="objective">MEOW CORP HQ — badge in, elevator up to your team on 12F</div>
  <div id="bigmsg"><h1>🎉 Clocked In!</h1><p>Made it to the team on 12F. Another purr-fect workday 🐾</p></div>
  <div id="badge">
    <div class="bphoto">🐱</div>
    <div class="binfo"><b>MEOW CORP</b><span>Nyang · 12F Team</span><span class="bno">EMP NO. 1204</span></div>
  </div>
  <div id="quest"></div>
  <div id="carry"></div>
  <div id="dlg">
    <span class="nm" id="dlgName"></span><span class="hearts" id="dlgHearts"></span>
    <div class="tx" id="dlgText"></div>
    <div class="choices" id="dlgChoices" style="display:none"></div>
    <div class="next" id="dlgNext">E or click to continue ▸</div>
  </div>
  <div id="daysum">
    <h1 id="sumTitle"></h1>
    <div class="box" id="sumBody"></div>
    <div class="go">E: Start the next day</div>
    <div class="rst">R: Restart from Day 1</div>
  </div>
  <div id="fade"><div id="floorNum"></div><div id="floorLbl"></div></div>
</div>
<script src="./three.min.js"></script>
<script src="./GLTFLoader.js"></script>
<script src="./kenney-assets.js"></script>
<script src="./js/data.js"></script>
<script src="./js/engine.js"></script>
<script src="./js/world.js"></script>
<script src="./js/game.js"></script>
</body>
</html>
